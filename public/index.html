<!DOCTYPE html>

<title>Latest Image</title>
</head>
<body>

<h1>Latest Uploaded Image</h1>

<img id="latestImage" src="/latest.png" width="400">

<script>
function refreshImage() {
  document.getElementById("latestImage").src =
    "/latest.png";
}

setInterval(refreshImage, 3000);
</script>
